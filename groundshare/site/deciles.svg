<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Net annual transfer by land-wealth decile under the equal land share: deciles one through seven receive, decile eight roughly breaks even, and the top two deciles pay, with the top decile paying by far the most.">
  <rect width="760" height="460" fill="#fcfcfb"/>

  <!-- Title -->
  <text x="24" y="30" font-size="15" font-weight="600" fill="#0b0b0b">Who pays, who receives — by land-wealth decile</text>
  <text x="24" y="49" font-size="12.5" fill="#52514e">Net annual transfer at r = 5%, V̄ = $100k · illustrative right-skewed distribution</text>

  <!-- Legend -->
  <g font-size="11.5" fill="#52514e">
    <rect x="524" y="22" width="10" height="10" rx="2" fill="#2a78d6"/>
    <text x="539" y="31">Net recipients</text>
    <rect x="634" y="22" width="10" height="10" rx="2" fill="#e34948"/>
    <text x="649" y="31">Net payers</text>
  </g>

  <!-- Gridlines -->
  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="64" y1="81" x2="740" y2="81"/>
    <line x1="64" y1="191" x2="740" y2="191"/>
    <line x1="64" y1="246" x2="740" y2="246"/>
    <line x1="64" y1="301" x2="740" y2="301"/>
    <line x1="64" y1="356" x2="740" y2="356"/>
  </g>
  <!-- Zero line -->
  <line x1="64" y1="136" x2="740" y2="136" stroke="#c3c2b7" stroke-width="1.5"/>

  <!-- Y labels -->
  <g font-size="11" fill="#898781" text-anchor="end">
    <text x="56" y="85">+$5k</text>
    <text x="56" y="140">$0</text>
    <text x="56" y="195">−$5k</text>
    <text x="56" y="250">−$10k</text>
    <text x="56" y="305">−$15k</text>
    <text x="56" y="360">−$20k</text>
  </g>

  <!-- Bars: slot 67.6, width 44, x_i = 64 + i*67.6 + 11.8 ; zero at y=136 -->
  <!-- D1 T=+5.0 -->
  <path d="M75.8 136 V85 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D2 T=+5.0 -->
  <path d="M143.4 136 V85 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D3 T=+4.75 -->
  <path d="M211 136 V87.75 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D4 T=+4.25 -->
  <path d="M278.6 136 V93.25 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D5 T=+3.5 -->
  <path d="M346.2 136 V101.5 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D6 T=+2.5 -->
  <path d="M413.8 136 V112.5 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D7 T=+1.25 -->
  <path d="M481.4 136 V126.25 q0-4 4-4 h36 q4 0 4 4 V136 Z" fill="#2a78d6"/>
  <!-- D8 T=−0.25 (tiny) -->
  <rect x="549" y="136" width="44" height="2.75" rx="1" fill="#e34948"/>
  <!-- D9 T=−3.0 -->
  <path d="M616.6 136 V165 q0 4 4 4 h36 q4 0 4-4 V136 Z" fill="#e34948"/>
  <!-- D10 T=−23.0 -->
  <path d="M684.2 136 V385 q0 4 4 4 h36 q4 0 4-4 V136 Z" fill="#e34948"/>

  <!-- Selective direct labels -->
  <g font-size="10.5" fill="#52514e">
    <text x="97.8" y="74" text-anchor="middle" font-weight="600">+$5,000</text>
    <text x="368.2" y="94" text-anchor="middle" font-weight="600">+$3,500</text>
    <text x="610" y="154" text-anchor="end">≈ break-even (−$250)</text>
    <text x="706.2" y="404" text-anchor="middle" font-weight="600">−$23,000</text>
  </g>

  <!-- Annotation -->
  <g font-size="11" fill="#52514e" font-style="italic">
    <text x="130" y="230">7 of 10 deciles receive: land wealth is right-skewed,</text>
    <text x="130" y="246">so most people hold less than the equal share —</text>
    <text x="130" y="262">the mean sits well above the median.</text>
  </g>

  <!-- X axis: decile labels + land value held -->
  <g font-size="11" fill="#898781" text-anchor="middle">
    <text x="97.8" y="422">D1</text><text x="165.4" y="422">D2</text><text x="233" y="422">D3</text>
    <text x="300.6" y="422">D4</text><text x="368.2" y="422">D5</text><text x="435.8" y="422">D6</text>
    <text x="503.4" y="422">D7</text><text x="571" y="422">D8</text><text x="638.6" y="422">D9</text>
    <text x="706.2" y="422">D10</text>
  </g>
  <g font-size="10" fill="#898781" text-anchor="middle">
    <text x="97.8" y="437">$0</text><text x="165.4" y="437">$0</text><text x="233" y="437">$5k</text>
    <text x="300.6" y="437">$15k</text><text x="368.2" y="437">$30k</text><text x="435.8" y="437">$50k</text>
    <text x="503.4" y="437">$75k</text><text x="571" y="437">$105k</text><text x="638.6" y="437">$160k</text>
    <text x="706.2" y="437">$560k</text>
  </g>
  <text x="402" y="455" font-size="11.5" fill="#52514e" text-anchor="middle">Land value held per adult, by decile (illustrative; mean = $100k)</text>
</svg>
