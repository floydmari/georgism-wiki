<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="The equal land share payment schedule: a single straight line through the per-capita threshold. Citizens holding less than the equal share receive payments; holders of more pay in.">
  <rect width="760" height="440" fill="#fcfcfb"/>

  <!-- Title -->
  <text x="24" y="30" font-size="15" font-weight="600" fill="#0b0b0b">The equal-land-share schedule</text>
  <text x="24" y="49" font-size="12.5" fill="#52514e">Annual net transfer T = r × (V̄ − V) · illustrative: equal share V̄ = $100k per citizen, r = 5%</text>

  <!-- Legend -->
  <g font-size="11.5" fill="#52514e">
    <rect x="472" y="22" width="10" height="10" rx="2" fill="#2a78d6"/>
    <text x="487" y="31">Net recipients (V &lt; V̄)</text>
    <rect x="618" y="22" width="10" height="10" rx="2" fill="#e34948"/>
    <text x="633" y="31">Net payers (V &gt; V̄)</text>
  </g>

  <!-- Gridlines -->
  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="64" y1="111.25" x2="740" y2="111.25"/>
    <line x1="64" y1="248.75" x2="740" y2="248.75"/>
    <line x1="64" y1="317.5" x2="740" y2="317.5"/>
    <line x1="64" y1="386.25" x2="740" y2="386.25"/>
  </g>
  <!-- Zero line -->
  <line x1="64" y1="180" x2="740" y2="180" stroke="#c3c2b7" stroke-width="1.5"/>

  <!-- Y labels -->
  <g font-size="11" fill="#898781" text-anchor="end">
    <text x="56" y="115">+$5k</text>
    <text x="56" y="184">$0</text>
    <text x="56" y="252.5">−$5k</text>
    <text x="56" y="321.5">−$10k</text>
    <text x="56" y="390">−$15k</text>
  </g>

  <!-- Shaded polarity regions -->
  <polygon points="64,180 64,111.25 233,180" fill="#2a78d6" fill-opacity="0.12"/>
  <polygon points="233,180 740,386.25 740,180" fill="#e34948" fill-opacity="0.12"/>

  <!-- Threshold -->
  <line x1="233" y1="70" x2="233" y2="400" stroke="#898781" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="239" y="84" font-size="11.5" fill="#52514e" font-weight="600">V̄ — the equal share</text>
  <text x="239" y="99" font-size="10.5" fill="#898781">hold exactly your share: pay and receive nothing</text>

  <!-- Schedule line -->
  <line x1="64" y1="111.25" x2="233" y2="180" stroke="#2a78d6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="233" y1="180" x2="740" y2="386.25" stroke="#e34948" stroke-width="2.5" stroke-linecap="round"/>

  <!-- No-kink note -->
  <g font-size="11" fill="#52514e" font-style="italic">
    <text x="88" y="296">One straight line: the marginal cost of holding more</text>
    <text x="88" y="312">land is the same everywhere — no kink at the threshold,</text>
    <text x="88" y="328">unlike a negative income tax.</text>
  </g>

  <!-- Persona markers -->
  <circle cx="64" cy="111.25" r="5" fill="#2a78d6" stroke="#fcfcfb" stroke-width="2"/>
  <text x="76" y="130" font-size="11" fill="#0b0b0b">Renter (owns $0): <tspan font-weight="600">receives $5,000/yr</tspan></text>

  <circle cx="165.4" cy="152.5" r="5" fill="#2a78d6" stroke="#fcfcfb" stroke-width="2"/>
  <text x="177" y="170" font-size="11" fill="#0b0b0b">Owns $60k: <tspan font-weight="600">receives $2,000/yr</tspan></text>

  <circle cx="571" cy="317.5" r="5" fill="#e34948" stroke="#fcfcfb" stroke-width="2"/>
  <text x="561" y="346" font-size="11" fill="#0b0b0b" text-anchor="end">Owns $300k (3× share): <tspan font-weight="600">pays $10,000/yr</tspan></text>

  <!-- X axis -->
  <g font-size="11" fill="#898781" text-anchor="middle">
    <text x="64" y="418">$0</text>
    <text x="233" y="418">$100k</text>
    <text x="402" y="418">$200k</text>
    <text x="571" y="418">$300k</text>
    <text x="740" y="418">$400k</text>
  </g>
  <text x="402" y="436" font-size="11.5" fill="#52514e" text-anchor="middle">Land value attributed to you (V)</text>
</svg>
